version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devops_ecommerce

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: backend

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: devops_ecommerce
      JWT_SECRET: mysecret

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  postgres_data: